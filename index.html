<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Lulushka & Mailoushka ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
    font-size:32px;
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.yes{
    background:#ff4d6d;
    color:white;
}

.no{
    background:#ccc;
}

.result{
    margin-top:20px;
    font-size:24px;
    color:#ff4d6d;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>A e do Lulushka Mailoushken e vet? ❤️</h1>

<button class="yes" onclick="showLove()">Po ❤️</button>
<button class="no" onclick="showNo()">Jo 😢</button>

<div class="result" id="result"></div>
</div>

<script>
function showLove(){
    document.getElementById("result").innerHTML =
    "Sigurisht që PO! ❤️ Lulushka e do shumë Mailoushken!";
}

function showNo(){
    document.getElementById("result").innerHTML =
    "Hmm... kjo nuk duket e vërtetë 😄";
}
</script>

</body>
</html>
